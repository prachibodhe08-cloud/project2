<!-- New Features -->
<button id="themeBtn" style="position:fixed;top:20px;right:20px;padding:10px 15px;border:none;border-radius:50%;cursor:pointer;font-size:18px;">🌙</button>

<button id="topBtn" style="position:fixed;bottom:20px;right:20px;padding:12px 15px;border:none;border-radius:50%;background:#4facfe;color:white;font-size:18px;display:none;cursor:pointer;">
<i class="fas fa-arrow-up"></i>
</button>

<script>
const themeBtn=document.getElementById("themeBtn");
const topBtn=document.getElementById("topBtn");

themeBtn.onclick=()=>{
document.body.classList.toggle("light");
themeBtn.textContent=document.body.classList.contains("light")?"☀️":"🌙";
};

window.onscroll=()=>{
topBtn.style.display=window.scrollY>300?"block":"none";
};

topBtn.onclick=()=>{
window.scrollTo({
top:0,
behavior:"smooth"
});
};
</script>
